name: Build Linux ONNX Runtime Providers

on:
  workflow_dispatch:
    inputs:
      provider_set:
        description: Provider bundle to build
        required: true
        default: webgpu
        type: choice
        options:
          - migraphx
          - webgpu
          - all
      ort_version:
        description: ONNX Runtime version
        required: true
        default: 1.24.2
      migraphx_home:
        description: MIGraphX root on the runner, only used for MIGraphX builds
        required: false
        default: /usr
      rocm_version_label:
        description: Artifact suffix for ROCm version
        required: true
        default: rocm6
      clean_build:
        description: Remove provider build dir before building
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.provider_set }} runtime
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 1440

    steps:
      - name: Checkout runtime deps repo
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          uname -a
          python3 --version
          cmake --version
          ninja --version
          if command -v rocminfo >/dev/null 2>&1; then rocminfo | head -n 40; fi
          if command -v hipconfig >/dev/null 2>&1; then hipconfig --version; fi

      - name: Build runtime bundle
        env:
          ORT_VERSION: ${{ inputs.ort_version }}
          REDLNX_PROVIDER_SET: ${{ inputs.provider_set }}
          ROCM_HOME: ${{ inputs.migraphx_home }}
          MIGRAPHX_HOME: ${{ inputs.migraphx_home }}
          ROCM_VERSION_LABEL: ${{ inputs.rocm_version_label }}
          CLEAN_BUILD: ${{ inputs.clean_build }}
          WORK_DIR: ${{ github.workspace }}/.work
          OUT_DIR: ${{ github.workspace }}/dist
        run: |
          chmod +x bin/build-onnxruntime-linux.sh bin/check-linux-runtime-package.sh
          bin/build-onnxruntime-linux.sh
          for archive in dist/*.tar.zst; do
            bin/check-linux-runtime-package.sh "$archive"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: redlnx-linux-onnxruntime-${{ inputs.provider_set }}-${{ inputs.ort_version }}
          path: |
            dist/*.tar.zst
            dist/*.sha256
          if-no-files-found: error

      - name: Attach assets to release tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.zst
            dist/*.sha256
          generate_release_notes: true
